<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온도에 따른 입자의 운동 시뮬레이션</title>
    <link href="temperature_updated.css" rel="stylesheet" type="text/css" />
    <style>
        <!-- canvas { border: 1px solid black; } 
        -->
    </style>
</head>
<body>
    <label for="temperature">초기온도 (K): </label>
<input type="number" id="temperature" value="300">
<button id="start">Start</button>
<button id="pause" disabled>Pause</button>
<button id="reset" disabled>Reset</button>
<div id="stopwatch" aria-label="stopwatch">00:00.000</div>
    <div id="container">
        <canvas id="simulationCanvas" width="600" height="600"></canvas>
    </div>
    <script src="./Temperature_updated.js"></script>
</body>
</html>
